<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>BaitLogic Admin</title>

<style>
body{
    background:#07110b;
    color:white;
    font-family:Arial,sans-serif;
    padding:40px;
}

.card{
    max-width:800px;
    margin:auto;
    background:#111915;
    padding:30px;
    border-radius:15px;
}

h1{
    color:#5eff7a;
}

.stat{
    background:#1a241d;
    padding:15px;
    margin:10px 0;
    border-radius:10px;
}

input{
    width:100%;
    padding:12px;
    margin:15px 0;
    border-radius:8px;
    border:none;
}

button{
    padding:12px 20px;
    background:#5eff7a;
    color:black;
    border:none;
    border-radius:8px;
    font-weight:bold;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="card">

<h1>BaitLogic Admin</h1>

<p>
Administrative dashboard for
BaitLogic conservation and
community reporting.
</p>

<input
id="adminKey"
type="password"
placeholder="Admin key">

<button onclick="loadDashboard()">
Load Dashboard
</button>

<div class="stat">
Total Signups:
<span id="signups">0</span>
</div>

<div class="stat">
Total Reports:
<span id="reports">0</span>
</div>

<div class="stat">
Total Catches:
<span id="catches">0</span>
</div>

</div>

<script src="/admin.js"></script>

</body>
</html>
